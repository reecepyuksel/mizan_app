services:
  db:
    image: postgres:16
    container_name: mizan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "55432:5432"
    volumes:
      - mizan_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./docker/postgres/hunspell:/usr/share/postgresql/16/tsearch_data

  redis:
    image: redis:7-alpine
    container_name: mizan-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "56379:6379"
    volumes:
      - mizan_redis_data:/data

volumes:
  mizan_postgres_data:
  mizan_redis_data:
