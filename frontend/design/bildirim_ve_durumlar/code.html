<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Serif:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#071e27",
                    "tertiary-fixed": "#fbe0a5",
                    "primary-container": "#064e3b",
                    "secondary-container": "#cfe6f2",
                    "surface-container": "#efeeea",
                    "secondary-fixed-dim": "#b4cad6",
                    "error-container": "#ffdad6",
                    "on-secondary": "#ffffff",
                    "on-background": "#1b1c1a",
                    "primary": "#003527",
                    "background": "#fbf9f5",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#0b513d",
                    "outline": "#707974",
                    "surface-tint": "#2b6954",
                    "on-secondary-container": "#526772",
                    "on-tertiary-container": "#c8af78",
                    "surface-variant": "#e4e2de",
                    "on-surface": "#1b1c1a",
                    "secondary-fixed": "#cfe6f2",
                    "on-tertiary-fixed": "#251a00",
                    "tertiary-container": "#534216",
                    "inverse-on-surface": "#f2f0ed",
                    "on-error": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#404944",
                    "on-secondary-fixed-variant": "#354a53",
                    "on-tertiary-fixed-variant": "#564418",
                    "surface-container-highest": "#e4e2de",
                    "on-primary-fixed": "#002117",
                    "surface-dim": "#dbdad6",
                    "inverse-surface": "#30312e",
                    "primary-fixed": "#b0f0d6",
                    "tertiary-fixed-dim": "#dec48b",
                    "on-primary-container": "#80bea6",
                    "surface": "#fbf9f5",
                    "tertiary": "#3b2c02",
                    "error": "#ba1a1a",
                    "secondary": "#4c616c",
                    "on-primary": "#ffffff",
                    "primary-fixed-dim": "#95d3ba",
                    "surface-container-low": "#f5f3ef",
                    "surface-bright": "#fbf9f5",
                    "outline-variant": "#bfc9c3",
                    "surface-container-high": "#eae8e4",
                    "inverse-primary": "#95d3ba"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Noto Serif"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow {
            box-shadow: 0px 12px 32px rgba(31, 41, 55, 0.05);
        }
        .glass-panel {
            background: rgba(251, 249, 245, 0.8);
            backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-4">
<!-- Main Onboarding Modal Container -->
<div class="max-w-md w-full bg-surface-container-lowest rounded-[2rem] overflow-hidden editorial-shadow border border-outline-variant/10 relative">
<!-- Hero Illustration Section -->
<div class="relative h-64 w-full overflow-hidden">
<img alt="Mosque at dawn" class="w-full h-full object-cover" data-alt="Cinematic wide shot of a majestic mosque silhouette at dawn with soft teal and gold mist and ethereal morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCvFjVUg-HjaHN0m4PQGQsTktyRgb11NQgiiCyoXwrF2jRw8Ud_OWevlYTSbBYHm-hhQYDV5SBs7zJ8F2ySSCIDwuZDsDW88uiiNixfGE77tsVfQ1Nkd74rmHw3Y3-npbHTX22KfHEUtM6APqp4e8pfmm9vgo1Sxjf71xyRhwUMcyqpOKQgDaxZzstUeRK9MWCtiz47_BesVK5ArMHkxmAOAtwz5tl2CvwHn_P-cxNDZa2aGSqhdihdgYHHb6vK6nufkJGZFVOda8o"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest via-transparent to-transparent"></div>
<!-- Floating Decorative Element -->
<div class="absolute top-6 right-6 bg-white/20 backdrop-blur-md rounded-full p-3 border border-white/30">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
</div>
</div>
<!-- Content Section -->
<div class="px-8 pt-2 pb-10 flex flex-col items-start">
<!-- Headline with Asymmetric Indentation -->
<h1 class="font-headline text-3xl text-primary leading-tight mb-6 mt-2">
                Vakitleri kaçırmayın
            </h1>
<!-- Benefits List -->
<div class="space-y-6 mb-10 w-full">
<!-- Item 1 -->
<div class="flex items-start gap-4">
<div class="mt-1 w-10 h-10 rounded-2xl bg-surface-container-low flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="schedule">schedule</span>
</div>
<div>
<h3 class="font-semibold text-on-surface">Namaz vakitleri bildirimleri</h3>
<p class="text-sm text-on-surface-variant leading-relaxed">Ezan vakitlerinden önce ve vakit girdiğinde hatırlatıcılar alın.</p>
</div>
</div>
<!-- Item 2 -->
<div class="flex items-start gap-4">
<div class="mt-1 w-10 h-10 rounded-2xl bg-surface-container-low flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="auto_stories">auto_stories</span>
</div>
<div>
<h3 class="font-semibold text-on-surface">Günlük Ayet ve Hadisler</h3>
<p class="text-sm text-on-surface-variant leading-relaxed">Günün her saati ilham verici içeriklerle maneviyatınızı tazeleyin.</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full space-y-4">
<button class="w-full py-4 rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-semibold tracking-wide shadow-lg shadow-primary/20 active:scale-95 transition-transform duration-200">
                    Bildirimleri Aç
                </button>
<button class="w-full py-3 rounded-full text-primary font-medium text-sm hover:bg-primary/5 transition-colors">
                    Daha Sonra
                </button>
</div>
</div>
</div>
<!-- Feedback Snackbar (Status Feedback) -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-sm z-50">
<div class="bg-primary text-on-primary px-6 py-4 rounded-2xl shadow-2xl flex items-center justify-between gap-4">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="text-sm font-medium tracking-wide">Senkronizasyon Başarılı</span>
</div>
<button class="text-xs uppercase font-bold tracking-widest text-on-primary-container hover:text-white transition-colors">
                Tamam
            </button>
</div>
</div>
<!-- Decorative Canvas Elements (Subtle Editorial Touches) -->
<div class="fixed top-0 left-0 -z-10 w-full h-full overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-primary-fixed opacity-10 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-80 h-80 bg-tertiary-fixed opacity-20 rounded-full blur-3xl"></div>
</div>
</body></html>
